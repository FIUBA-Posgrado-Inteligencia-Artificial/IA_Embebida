<svg viewBox="0 0 850 250" data-id="diagram" style="width: 100%; height: 180px;" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orientation="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#6c8ebf" />
        </marker>
        <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orientation="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#82b366" />
        </marker>
        <marker id="arrow-orange" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orientation="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#d79b00" />
        </marker>
        <marker id="arrow-yellow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orientation="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#d6b656" />
        </marker>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orientation="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#b85450" />
        </marker>
        <marker id="arrow-purple" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orientation="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#9673a6" />
        </marker>
    </defs>

    <!-- Connections -->
    <line x1="110" y1="125" x2="160" y2="125" stroke="#6c8ebf" stroke-width="2" marker-end="url(#arrow-blue)" data-id="path1" />
    <line x1="250" y1="125" x2="300" y2="125" stroke="#82b366" stroke-width="2" marker-end="url(#arrow-green)" data-id="path2" />
    <line x1="390" y1="125" x2="440" y2="125" stroke="#d79b00" stroke-width="2" marker-end="url(#arrow-orange)" data-id="path3" />
    <line x1="530" y1="125" x2="580" y2="125" stroke="#d6b656" stroke-width="2" marker-end="url(#arrow-yellow)" data-id="path4" />
    <line x1="670" y1="125" x2="720" y2="125" stroke="#b85450" stroke-width="2" marker-end="url(#arrow-red)" data-id="path5" />

    <!-- Feedback Loops -->
    <path d="M 625 80 Q 365 10 105 80" stroke="#b85450" stroke-width="2" stroke-dasharray="0" fill="none" marker-end="url(#arrow-red)" data-id="loop1" />
    <path d="M 625 170 Q 490 240 355 170" stroke="#b85450" stroke-width="2" stroke-dasharray="0" fill="none" marker-end="url(#arrow-red)" data-id="loop2" />

    <!-- Nodes -->
    <g data-id="node1">
        <circle cx="65" cy="125" r="45" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2" />
        <text x="65" y="122" text-anchor="middle" font-size="11" fill="#000" font-weight="500" font-family="Inter, sans-serif">Adquisición</text>
        <text x="65" y="136" text-anchor="middle" font-size="11" fill="#000" font-weight="500" font-family="Inter, sans-serif">de datos</text>
    </g>

    <g data-id="node2">
        <circle cx="205" cy="125" r="45" fill="#d5e8d4" stroke="#82b366" stroke-width="2" />
        <text x="205" y="122" text-anchor="middle" font-size="11" fill="#000" font-weight="500" font-family="Inter, sans-serif">Preparación</text>
        <text x="205" y="136" text-anchor="middle" font-size="11" fill="#000" font-weight="500" font-family="Inter, sans-serif">de datos</text>
    </g>

    <g data-id="node3">
        <circle cx="345" cy="125" r="45" fill="#ffe6cc" stroke="#d79b00" stroke-width="2" />
        <text x="345" y="122" text-anchor="middle" font-size="11" fill="#000" font-weight="500" font-family="Inter, sans-serif">Selección de</text>
        <text x="345" y="136" text-anchor="middle" font-size="11" fill="#000" font-weight="500" font-family="Inter, sans-serif">modelo</text>
    </g>

    <g data-id="node4">
        <circle cx="485" cy="125" r="45" fill="#fff2cc" stroke="#d6b656" stroke-width="2" />
        <text x="485" y="128" text-anchor="middle" font-size="11" fill="#000" font-weight="500" font-family="Inter, sans-serif">Entrenamiento</text>
    </g>

    <g data-id="node5">
        <circle cx="625" cy="125" r="45" fill="#f8cecc" stroke="#b85450" stroke-width="2" />
        <text x="625" y="128" text-anchor="middle" font-size="11" fill="#000" font-weight="500" font-family="Inter, sans-serif">Evaluación</text>
    </g>

    <g data-id="node6">
        <circle cx="765" cy="125" r="45" fill="#e1d5e7" stroke="#9673a6" stroke-width="2" />
        <text x="765" y="128" text-anchor="middle" font-size="11" fill="#000" font-weight="500" font-family="Inter, sans-serif">Despliegue</text>
    </g>
</svg>
