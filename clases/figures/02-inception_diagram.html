<svg viewBox="0 0 800 200"
    style="width: 100%; display: block; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); border-radius: 0.5rem; background: rgba(255,255,255,0.05);">
    <defs>
        <marker id="arrow-incep" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(248, 248, 242, 0.4)" />
        </marker>
        <filter id="glow-incep">
            <feGaussianBlur stdDeviation="2" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="400" y="25" fill="#f8f8f2" font-size="14" font-weight="bold" font-family="sans-serif"
        text-anchor="middle">Inception / GoogLeNet</text>

    <!-- Main pipeline -->
    <rect x="20" y="85" width="30" height="30" fill="rgba(248, 248, 242, 0.2)" stroke="#f8f8f2" stroke-width="2" />
    <text x="35" y="130" fill="#f8f8f2" font-size="10" font-family="sans-serif" text-anchor="middle">In</text>

    <path d="M 50 100 L 70 100" stroke="rgba(248, 248, 242, 0.4)" stroke-width="2" marker-end="url(#arrow-incep)" />

    <rect x="80" y="75" width="20" height="50" fill="rgba(189, 147, 249, 0.4)" stroke="#bd93f9" />
    <text x="90" y="140" fill="#bd93f9" font-size="10" font-family="sans-serif" text-anchor="middle">Conv</text>

    <path d="M 100 100 L 120 100" stroke="rgba(248, 248, 242, 0.4)" stroke-width="2" marker-end="url(#arrow-incep)" />

    <rect x="130" y="80" width="15" height="40" fill="rgba(80, 250, 123, 0.4)" stroke="#50fa7b" />
    <text x="137" y="135" fill="#50fa7b" font-size="10" font-family="sans-serif" text-anchor="middle">Pool</text>

    <!-- Inception Expansion -->
    <path d="M 145 100 L 170 100" stroke="rgba(248, 248, 242, 0.4)" stroke-width="2" marker-end="url(#arrow-incep)" />

    <!-- Inception Block Representation -->
    <rect x="180" y="50" width="240" height="100" rx="8" fill="rgba(68, 71, 90, 0.3)" stroke="#44475a"
        stroke-dasharray="4" filter="url(#glow-incep)" />
    <text x="300" y="45" fill="#6272a4" font-size="10" font-weight="bold" font-family="sans-serif"
        text-anchor="middle">Inception Module (Parallel Paths)</text>

    <path d="M 180 100 L 200 100 M 200 100 L 200 65 L 220 65 M 200 100 L 220 100 M 200 100 L 200 135 L 220 135"
        stroke="rgba(248, 248, 242, 0.4)" stroke-width="2" marker-end="url(#arrow-incep)" fill="none" />

    <!-- Path 1 -->
    <rect x="230" y="55" width="40" height="20" rx="4" fill="rgba(189, 147, 249, 0.6)" stroke="#bd93f9" />
    <text x="250" y="69" fill="#bd93f9" font-size="10" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">1x1</text>

    <path d="M 270 65 L 290 65" stroke="rgba(248, 248, 242, 0.4)" stroke-width="2" marker-end="url(#arrow-incep)" />

    <rect x="300" y="55" width="40" height="20" rx="4" fill="rgba(189, 147, 249, 0.8)" stroke="#bd93f9" />
    <text x="320" y="69" fill="#f8f8f2" font-size="10" font-family="sans-serif" text-anchor="middle">3x3</text>

    <!-- Path 2 -->
    <rect x="230" y="90" width="40" height="20" rx="4" fill="rgba(189, 147, 249, 0.6)" stroke="#bd93f9" />
    <text x="250" y="104" fill="#bd93f9" font-size="10" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">1x1</text>

    <path d="M 270 100 L 290 100" stroke="rgba(248, 248, 242, 0.4)" stroke-width="2" marker-end="url(#arrow-incep)" />

    <rect x="300" y="90" width="40" height="20" rx="4" fill="rgba(189, 147, 249, 1.0)" stroke="#bd93f9" />
    <text x="320" y="104" fill="#f8f8f2" font-size="10" font-family="sans-serif" text-anchor="middle">5x5</text>

    <!-- Path 3 -->
    <rect x="230" y="125" width="40" height="20" rx="4" fill="rgba(80, 250, 123, 0.6)" stroke="#50fa7b" />
    <text x="250" y="139" fill="#f8f8f2" font-size="10" font-family="sans-serif" text-anchor="middle">Pool</text>

    <path d="M 270 135 L 290 135" stroke="rgba(248, 248, 242, 0.4)" stroke-width="2" marker-end="url(#arrow-incep)" />

    <rect x="300" y="125" width="40" height="20" rx="4" fill="rgba(189, 147, 249, 0.6)" stroke="#bd93f9" />
    <text x="320" y="139" fill="#f8f8f2" font-size="10" font-family="sans-serif" font-weight="bold"
        text-anchor="middle">1x1</text>

    <!-- Concat -->
    <path d="M 340 65 L 360 65 L 360 100 L 375 100 M 340 100 L 375 100 M 340 135 L 360 135 L 360 100 L 375 100"
        stroke="rgba(248, 248, 242, 0.4)" stroke-width="2" marker-end="url(#arrow-incep)" fill="none" />

    <rect x="385" y="60" width="20" height="80" rx="4" fill="rgba(139, 233, 253, 0.6)" stroke="#8be9fd" />
    <text x="395" y="100" fill="#f8f8f2" font-size="10" font-family="sans-serif" text-anchor="middle"
        transform="rotate(-90 395,100)">Concat</text>

    <!-- Further along -->
    <path d="M 420 100 L 450 100" stroke="rgba(248, 248, 242, 0.4)" stroke-width="2" marker-end="url(#arrow-incep)" />

    <text x="475" y="105" fill="#f8f8f2" font-size="14" font-weight="bold" font-family="sans-serif"
        text-anchor="middle">. . . . .</text>

    <path d="M 500 100 L 530 100" stroke="rgba(248, 248, 242, 0.4)" stroke-width="2" marker-end="url(#arrow-incep)" />

    <!-- Output Average Pool & Softmax -->
    <rect x="540" y="75" width="40" height="50" fill="rgba(80, 250, 123, 0.8)" stroke="#50fa7b"
        filter="url(#glow-incep)" />
    <text x="560" y="100" fill="#f8f8f2" font-size="10" font-family="sans-serif" text-anchor="middle">Avg</text>
    <text x="560" y="112" fill="#f8f8f2" font-size="10" font-family="sans-serif" text-anchor="middle">Pool</text>

    <path d="M 580 100 L 610 100" stroke="rgba(248, 248, 242, 0.4)" stroke-width="2" marker-end="url(#arrow-incep)" />

    <rect x="620" y="40" width="30" height="120" fill="rgba(255, 184, 108, 0.8)" stroke="#ffb86c"
        filter="url(#glow-incep)" />
    <text x="635" y="100" fill="#f8f8f2" font-size="10" font-family="sans-serif" text-anchor="middle"
        transform="rotate(-90 635,100)">FC / Softmax</text>

    <path d="M 650 100 L 690 100" stroke="rgba(248, 248, 242, 0.4)" stroke-width="2" marker-end="url(#arrow-incep)" />

    <circle cx="715" cy="100" r="15" fill="rgba(255, 85, 85, 0.8)" stroke="#ff5555" stroke-width="2"
        filter="url(#glow-incep)" />
    <text x="715" y="104" fill="#f8f8f2" font-size="10" font-weight="bold" font-family="sans-serif"
        text-anchor="middle">1000</text>

</svg>
