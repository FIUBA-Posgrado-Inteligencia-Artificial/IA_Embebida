<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        body {
            background: transparent;
            font-family: sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #f8f8f2;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .axis {
            width: 80%;
            height: 2px;
            background: rgba(248, 248, 242, 0.3);
            position: relative;
            margin-top: 100px;
        }

        .zero-line {
            width: 2px;
            height: 15px;
            background: rgba(248, 248, 242, 0.5);
            position: absolute;
            top: -7px;
            left: 50%;
            transform: translateX(-50%);
        }

        .zero-label {
            position: absolute;
            top: 12px;
            left: 50%;
            color: rgba(248, 248, 242, 0.5);
            font-size: 12px;
            transform: translateX(-50%);
        }

        .status {
            font-size: 14px;
            color: #f1fa8c;
            font-weight: bold;
            height: 20px;
            text-align: center;
            position: absolute;
            top: 15%;
            width: 100%;
        }

        #svg-container {
            position: absolute;
            top: 0px;
            left: 50%;
            width: 0;
            height: 0;
            overflow: visible;
        }

        #curve {
            fill: rgba(255, 85, 85, 0.3);
            stroke: #ff5555;
            stroke-width: 2px;
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1), fill 1s, stroke 1s;
        }

        .mean-line {
            position: absolute;
            width: 2px;
            height: 100px;
            background: #ffb86c;
            top: -100px;
            left: 50%;
            margin-left: -1px;
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s;
            opacity: 0;
            transform-origin: bottom center;
        }

        .mean-label {
            position: absolute;
            top: -115px;
            left: 50%;
            margin-left: -5px;
            color: #ffb86c;
            font-size: 14px;
            font-weight: bold;
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s;
            opacity: 0;
        }

        .bracket {
            position: absolute;
            height: 8px;
            border: 2px solid #bd93f9;
            border-bottom: none;
            top: -20px;
            left: 50%;
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1), width 1s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s;
            opacity: 0;
            transform-origin: left center;
            box-sizing: border-box;
        }

        .bracket-label {
            position: absolute;
            top: -38px;
            left: 50%;
            margin-left: -5px;
            color: #bd93f9;
            font-size: 12px;
            font-weight: bold;
            transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s;
            opacity: 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="status" id="status">1. Distribución Cruda del Mini-batch</div>
        <div class="axis">
            <div class="zero-line"></div>
            <div class="zero-label">0</div>

            <div id="svg-container">
                <svg style="overflow:visible">
                    <path id="curve" d=""></path>
                </svg>
            </div>

            <!-- Indicators -->
            <div class="mean-line" id="ml"></div>
            <div class="mean-label" id="ml-text">&mu;</div>
            <div class="bracket" id="std"></div>
            <div class="bracket-label" id="std-text">&sigma;</div>
        </div>
    </div>

    <script>
        // Generate base curve (std=1 represents 30px width, height 100px)
        const curve = document.getElementById('curve');
        let d = "M -150 0 ";
        for (let x = -150; x <= 150; x += 2) {
            let y = -100 * Math.exp(-0.5 * Math.pow(x / 30, 2));
            d += `L ${x} ${y} `;
        }
        d += "L 150 0 Z";
        curve.setAttribute('d', d);

        const ml = document.getElementById('ml');
        const mlText = document.getElementById('ml-text');
        const status = document.getElementById('status');
        const stdBracket = document.getElementById('std');
        const stdText = document.getElementById('std-text');

        let phase = 0;

        function animate() {
            if (phase === 0) {
                // Phase 0: Raw 
                status.textContent = "1. Distribución Cruda del Mini-batch";
                curve.style.transform = "translate(80px, 0) scale(2.0, 0.4)";
                curve.style.fill = "rgba(255, 85, 85, 0.3)";
                curve.style.stroke = "#ff5555";

                ml.style.opacity = 0;
                mlText.style.opacity = 0;
                stdBracket.style.opacity = 0;
                stdText.style.opacity = 0;

                // Position mean line at raw mean, but hidden
                ml.style.transform = "translate(80px, 0) scale(1, 0.4)";
                mlText.style.transform = "translate(80px, 60px)";

            } else if (phase === 1) {
                // Compute mean
                status.textContent = "2. Calcular Media (\u03bc)";
                ml.style.opacity = 1;
                mlText.style.opacity = 1;

            } else if (phase === 2) {
                // Center
                status.textContent = "3. Restar Media (Centrar en \u03bc = 0)";
                curve.style.transform = "translate(0px, 0) scale(2.0, 0.4)";
                ml.style.transform = "translate(0px, 0) scale(1, 0.4)";
                mlText.style.transform = "translate(0px, 60px)";

            } else if (phase === 3) {
                // Show Std
                status.textContent = "4. Calcular Desviación Estándar (\u03c3)";
                stdBracket.style.transform = "translate(-60px, 0)";
                stdBracket.style.width = "120px";
                stdBracket.style.opacity = 1;
                stdText.style.transform = "translate(0px, 0)";
                stdText.style.opacity = 1;

            } else if (phase === 4) {
                // Normalize
                status.textContent = "5. Dividir por \u03c3 (Varianza Unitaria)";
                curve.style.transform = "translate(0px, 0) scale(1.0, 1.0)";
                curve.style.fill = "rgba(80, 250, 123, 0.3)";
                curve.style.stroke = "#50fa7b";

                ml.style.transform = "translate(0px, 0) scale(1, 1.0)";
                mlText.style.transform = "translate(0px, 0px)";

                stdBracket.style.transform = "translate(-30px, -45px)";
                stdBracket.style.width = "60px";
                stdText.style.transform = "translate(0px, -45px)";
            }

            phase = (phase + 1) % 5;
            setTimeout(animate, 2500);
        }

        // Initialize state visually
        curve.style.transform = "translate(80px, 0) scale(2.0, 0.4)";
        ml.style.transform = "translate(80px, 0) scale(1, 0.4)";
        mlText.style.transform = "translate(80px, 60px)";

        setTimeout(animate, 2500);
    </script>
</body>

</html>
