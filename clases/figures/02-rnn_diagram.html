<svg viewBox="0 0 800 250"
    style="width: 100%; max-width: 800px; margin: 0 auto; display: block; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); border-radius: 0.5rem; background: rgba(255,255,255,0.05);">
    <defs>
        <!-- Glow effect -->
        <filter id="glow-rnn" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <!-- Arrowhead -->
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(248, 248, 242, 0.4)" />
        </marker>
        <marker id="arrow-active" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#f1fa8c" />
        </marker>
    </defs>

    <!-- General styles for connections -->
    <style>
        .path-line {
            stroke: rgba(248, 248, 242, 0.4);
            stroke-width: 2;
            fill: none;
            marker-end: url(#arrow);
        }

        .path-active {
            stroke: #f1fa8c;
            stroke-width: 2.5;
            fill: none;
            marker-end: url(#arrow-active);
            stroke-dasharray: 4;
            animation: dash 1s linear infinite;
        }

        @keyframes dash {
            to {
                stroke-dashoffset: -8;
            }
        }

        .box-text {
            font-family: sans-serif;
            font-size: 14px;
            fill: #f8f8f2;
            text-anchor: middle;
            dominant-baseline: middle;
        }

        .title-text {
            font-family: sans-serif;
            font-size: 16px;
            font-weight: bold;
            fill: #8be9fd;
            text-anchor: middle;
        }

        .label-text {
            font-family: math, sans-serif;
            font-size: 14px;
            fill: #6272a4;
            text-anchor: middle;
        }
    </style>

    <!-- ========================================== -->
    <!-- RNN Diagram -->
    <!-- ========================================== -->
    <g transform="translate(100, 30)">
        <text class="title-text" x="50" y="-10">RNN</text>

        <!-- Input -->
        <circle cx="50" cy="180" r="15" fill="rgba(139, 233, 253, 0.2)" stroke="#8be9fd" stroke-width="2"
            filter="url(#glow-rnn)" />
        <text class="box-text" fill="#8be9fd" x="50" y="180">x<tspan baseline-shift="sub" font-size="0.75em">t</tspan>
            </text>

        <!-- Hidden State (Previous) -->
        <path d="M -20 100 L 25 100" class="path-line" />
        <text class="label-text" x="0" y="85">h<tspan baseline-shift="sub" font-size="0.75em">t-1</tspan></text>

        <!-- Main Cell -->
        <rect x="25" y="60" width="50" height="80" rx="8" fill="rgba(189, 147, 249, 0.2)" stroke="#bd93f9"
            stroke-width="2" filter="url(#glow-rnn)" />
        <text class="box-text" x="50" y="100">tanh</text>

        <!-- Connections inside/to cell -->
        <path d="M 50 165 L 50 140" class="path-line" />

        <!-- Hidden State (Next) -->
        <path d="M 75 100 L 120 100" class="path-line" />
        <text class="label-text" x="100" y="85">h<tspan baseline-shift="sub" font-size="0.75em">t</tspan></text>

        <!-- Output -->
        <path d="M 50 60 L 50 35" class="path-line" />
        <circle cx="50" cy="20" r="15" fill="rgba(255, 85, 85, 0.2)" stroke="#ff5555" stroke-width="2"
            filter="url(#glow-rnn)" />
        <text class="box-text" fill="#ff5555" x="50" y="20">y<tspan baseline-shift="sub" font-size="0.75em">t</tspan>
            </text>
    </g>

    <!-- ========================================== -->
    <!-- GRU Diagram -->
    <!-- ========================================== -->
    <g transform="translate(350, 30)">
        <text class="title-text" x="50" y="-10">GRU</text>

        <!-- Input -->
        <circle cx="50" cy="180" r="15" fill="rgba(139, 233, 253, 0.2)" stroke="#8be9fd" stroke-width="2"
            filter="url(#glow-rnn)" />
        <text class="box-text" fill="#8be9fd" x="50" y="180">x<tspan baseline-shift="sub" font-size="0.75em">t</tspan>
            </text>

        <!-- Hidden State (Previous) -->
        <path d="M -20 100 L 15 100" class="path-line" />
        <text class="label-text" x="-5" y="85">h<tspan baseline-shift="sub" font-size="0.75em">t-1</tspan></text>

        <!-- Main Cell -->
        <rect x="15" y="60" width="70" height="80" rx="8" fill="rgba(189, 147, 249, 0.2)" stroke="#bd93f9"
            stroke-width="2" filter="url(#glow-rnn)" />

        <!-- Gates representations -->
        <rect x="25" y="110" width="20" height="15" rx="3" fill="rgba(80, 250, 123, 0.3)" stroke="#50fa7b" />
        <text class="box-text" font-size="10" x="35" y="118">&sigma;</text>
        <rect x="55" y="110" width="20" height="15" rx="3" fill="rgba(80, 250, 123, 0.3)" stroke="#50fa7b" />
        <text class="box-text" font-size="10" x="65" y="118">&sigma;</text>

        <rect x="40" y="75" width="20" height="15" rx="3" fill="rgba(255, 184, 108, 0.3)" stroke="#ffb86c" />
        <text class="box-text" font-size="10" x="50" y="83">tanh</text>

        <!-- Connections inside/to cell -->
        <path d="M 50 165 L 50 140" class="path-line" />

        <!-- Hidden State (Next) -->
        <path d="M 85 100 L 120 100" class="path-line" />
        <text class="label-text" x="105" y="85">h<tspan baseline-shift="sub" font-size="0.75em">t</tspan></text>

        <!-- Output -->
        <path d="M 50 60 L 50 35" class="path-line" />
        <circle cx="50" cy="20" r="15" fill="rgba(255, 85, 85, 0.2)" stroke="#ff5555" stroke-width="2"
            filter="url(#glow-rnn)" />
        <text class="box-text" fill="#ff5555" x="50" y="20">y<tspan baseline-shift="sub" font-size="0.75em">t</tspan>
            </text>

        <!-- Label for gates -->
        <text class="label-text" font-size="10" x="50" y="150" fill="#50fa7b">Update & Reset</text>
    </g>

    <!-- ========================================== -->
    <!-- LSTM Diagram -->
    <!-- ========================================== -->
    <g transform="translate(600, 30)">
        <text class="title-text" x="50" y="-10">LSTM</text>

        <!-- Input -->
        <circle cx="50" cy="180" r="15" fill="rgba(139, 233, 253, 0.2)" stroke="#8be9fd" stroke-width="2"
            filter="url(#glow-rnn)" />
        <text class="box-text" fill="#8be9fd" x="50" y="180">x<tspan baseline-shift="sub" font-size="0.75em">t</tspan>
            </text>

        <!-- Cell State (Previous) -->
        <path d="M -20 75 L 10 75" class="path-line" />
        <text class="label-text" x="-5" y="65">c<tspan baseline-shift="sub" font-size="0.75em">t-1</tspan></text>

        <!-- Hidden State (Previous) -->
        <path d="M -20 120 L 10 120" class="path-line" />
        <text class="label-text" x="-5" y="110">h<tspan baseline-shift="sub" font-size="0.75em">t-1</tspan></text>

        <!-- Main Cell -->
        <rect x="10" y="60" width="80" height="80" rx="8" fill="rgba(189, 147, 249, 0.2)" stroke="#bd93f9"
            stroke-width="2" filter="url(#glow-rnn)" />

        <!-- Gates representations -->
        <rect x="15" y="115" width="18" height="15" rx="3" fill="rgba(80, 250, 123, 0.3)" stroke="#50fa7b" />
        <text class="box-text" font-size="10" x="24" y="123">&sigma;</text>
        <rect x="41" y="115" width="18" height="15" rx="3" fill="rgba(80, 250, 123, 0.3)" stroke="#50fa7b" />
        <text class="box-text" font-size="10" x="50" y="123">&sigma;</text>
        <rect x="67" y="115" width="18" height="15" rx="3" fill="rgba(80, 250, 123, 0.3)" stroke="#50fa7b" />
        <text class="box-text" font-size="10" x="76" y="123">&sigma;</text>

        <!-- Candidate memory -->
        <rect x="41" y="90" width="18" height="15" rx="3" fill="rgba(255, 184, 108, 0.3)" stroke="#ffb86c" />
        <text class="box-text" font-size="9" x="50" y="98">tanh</text>

        <!-- Cell state line inside -->
        <path d="M 10 75 L 90 75" class="path-active" />

        <!-- Connections inside/to cell -->
        <path d="M 50 165 L 50 140" class="path-line" />

        <!-- Cell State (Next) -->
        <path d="M 90 75 L 120 75" class="path-line" />
        <text class="label-text" x="105" y="65">c<tspan baseline-shift="sub" font-size="0.75em">t</tspan></text>

        <!-- Hidden State (Next) -->
        <path d="M 90 120 L 120 120" class="path-line" />
        <text class="label-text" x="105" y="110">h<tspan baseline-shift="sub" font-size="0.75em">t</tspan></text>

        <!-- Output -->
        <path d="M 50 60 L 50 35" class="path-line" />
        <circle cx="50" cy="20" r="15" fill="rgba(255, 85, 85, 0.2)" stroke="#ff5555" stroke-width="2"
            filter="url(#glow-rnn)" />
        <text class="box-text" fill="#ff5555" x="50" y="20">y<tspan baseline-shift="sub" font-size="0.75em">t</tspan>
            </text>

        <!-- Labels -->
        <text class="label-text" font-size="8" x="50" y="150" fill="#50fa7b">F / I / O Gates</text>
    </g>

</svg>
