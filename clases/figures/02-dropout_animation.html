<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <style>
        body {
            background: transparent;
            font-family: sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #f8f8f2;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .network {
            display: flex;
            gap: 60px;
            align-items: center;
            position: relative;
        }

        .layer {
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 2;
        }

        .node {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #bd93f9;
            transition: all 0.5s;
            position: relative;
            box-shadow: 0 0 10px rgba(189, 147, 249, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            border: 2px solid transparent;
        }

        .node.in {
            background: #8be9fd;
            box-shadow: 0 0 10px rgba(139, 233, 253, 0.5);
        }

        .node.out {
            background: #ff79c6;
            box-shadow: 0 0 10px rgba(255, 121, 198, 0.5);
        }

        .node.dropped {
            background: #44475a !important;
            box-shadow: none !important;
            border-color: #ff5555;
            color: #ff5555;
            transform: scale(0.8);
        }

        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .conn {
            stroke: rgba(248, 248, 242, 0.3);
            stroke-width: 2;
            transition: all 0.5s;
        }

        .conn.dropped {
            stroke: rgba(255, 85, 85, 0.1);
            stroke-width: 1;
            stroke-dasharray: 4;
        }

        #status {
            margin-top: 20px;
            font-size: 14px;
            color: #f1fa8c;
            font-weight: bold;
            height: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="network" id="net">
            <svg id="lines"></svg>
            <div class="layer" id="layer-in">
                <div class="node in" id="n-0-0"></div>
                <div class="node in" id="n-0-1"></div>
                <div class="node in" id="n-0-2"></div>
            </div>
            <div class="layer" id="layer-h1">
                <div class="node" id="n-1-0"></div>
                <div class="node" id="n-1-1"></div>
                <div class="node" id="n-1-2"></div>
                <div class="node" id="n-1-3"></div>
                <div class="node" id="n-1-4"></div>
            </div>
            <div class="layer" id="layer-out">
                <div class="node out" id="n-2-0"></div>
                <div class="node out" id="n-2-1"></div>
            </div>
        </div>
        <div id="status">Paso de Entrenamiento 1</div>
    </div>

    <script>
        const layers = [
            document.querySelectorAll('#layer-in .node'),
            document.querySelectorAll('#layer-h1 .node'),
            document.querySelectorAll('#layer-out .node')
        ];
        const svg = document.getElementById('lines');
        const net = document.getElementById('net');
        let connections = [];

        function drawLines() {
            svg.innerHTML = '';
            connections = [];
            const rNet = net.getBoundingClientRect();

            for (let l = 0; l < layers.length - 1; l++) {
                const currentLayer = layers[l];
                const nextLayer = layers[l + 1];

                for (let i = 0; i < currentLayer.length; i++) {
                    const n1 = currentLayer[i];
                    const r1 = n1.getBoundingClientRect();
                    const x1 = r1.left + r1.width / 2 - rNet.left;
                    const y1 = r1.top + r1.height / 2 - rNet.top;

                    for (let j = 0; j < nextLayer.length; j++) {
                        const n2 = nextLayer[j];
                        const r2 = n2.getBoundingClientRect();
                        const x2 = r2.left + r2.width / 2 - rNet.left;
                        const y2 = r2.top + r2.height / 2 - rNet.top;

                        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                        line.setAttribute('x1', x1);
                        line.setAttribute('y1', y1);
                        line.setAttribute('x2', x2);
                        line.setAttribute('y2', y2);
                        line.setAttribute('class', 'conn');
                        svg.appendChild(line);

                        connections.push({ line, n1, n2 });
                    }
                }
            }
        }

        setTimeout(drawLines, 100);
        window.addEventListener('resize', drawLines);

        let epoch = 1;
        function animate() {
            // Reset
            layers[1].forEach(n => { n.classList.remove('dropped'); n.textContent = ''; });
            connections.forEach(c => c.line.classList.remove('dropped'));

            // Randomly drop nodes in hidden layer with 40% probability
            layers[1].forEach(n => {
                if (Math.random() < 0.4) {
                    n.classList.add('dropped');
                    n.textContent = 'X';
                }
            });

            // Update connections
            connections.forEach(c => {
                if (c.n1.classList.contains('dropped') || c.n2.classList.contains('dropped')) {
                    c.line.classList.add('dropped');
                }
            });

            document.getElementById('status').textContent = `Entrenamiento: Batch ${epoch}`;
            epoch++;
            setTimeout(animate, 1000);
        }

        setTimeout(animate, 500);
    </script>
</body>

</html>
