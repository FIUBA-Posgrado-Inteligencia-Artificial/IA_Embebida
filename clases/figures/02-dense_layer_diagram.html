<svg viewBox="0 0 400 400"
    style="width: 100%; max-width: 400px; margin: 0 auto; display: block; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); border-radius: 0.5rem; background: rgba(255,255,255,0.05);">
    <defs>
        <!-- Glow effect -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title / Labels -->
    <text x="100" y="30" fill="#f8f8f2" font-size="16" text-anchor="middle" font-family="sans-serif">Entradas (M)</text>
    <text x="300" y="30" fill="#f8f8f2" font-size="16" text-anchor="middle" font-family="sans-serif">Salidas (N)</text>

    <!-- Connections -->
    <path d="
    M 100 80 L 300 60
    M 100 160 L 300 60
    M 100 320 L 300 60

    M 100 80 L 300 130
    M 100 160 L 300 130
    M 100 320 L 300 130

    M 100 80 L 300 200
    M 100 160 L 300 200
    M 100 320 L 300 200

    M 100 80 L 300 340
    M 100 160 L 300 340
    M 100 320 L 300 340
  " stroke="rgba(248, 248, 242, 0.15)" stroke-width="1.5" fill="none" />

    <!-- Input Layer Nodes -->
    <g filter="url(#glow)">
        <g fill="rgba(139, 233, 253, 0.2)" stroke="#8be9fd" stroke-width="2">
            <circle cx="100" cy="80" r="22" />
            <circle cx="100" cy="160" r="22" />
            <!-- ellipsis -->
            <circle cx="100" cy="320" r="22" />
        </g>
        <g font-size="16" fill="#8be9fd" text-anchor="middle" font-family="math, sans-serif">
            <text x="100" y="85">x<tspan baseline-shift="sub" font-size="0.75em">1</tspan></text>
            <text x="100" y="165">x<tspan baseline-shift="sub" font-size="0.75em">2</tspan></text>
            <text x="100" y="240" font-size="24">⋮</text>
            <text x="100" y="325">x<tspan baseline-shift="sub" font-size="0.75em">M</tspan></text>
        </g>
    </g>

    <!-- Output Layer Nodes -->
    <g filter="url(#glow)">
        <g fill="rgba(189, 147, 249, 0.2)" stroke="#bd93f9" stroke-width="2">
            <circle cx="300" cy="60" r="22" />
            <circle cx="300" cy="130" r="22" />
            <circle cx="300" cy="200" r="22" />
            <!-- ellipsis -->
            <circle cx="300" cy="340" r="22" />
        </g>
        <g font-size="16" fill="#bd93f9" text-anchor="middle" font-family="math, sans-serif">
            <text x="300" y="65">y<tspan baseline-shift="sub" font-size="0.75em">1</tspan></text>
            <text x="300" y="135">y<tspan baseline-shift="sub" font-size="0.75em">2</tspan></text>
            <text x="300" y="205">y<tspan baseline-shift="sub" font-size="0.75em">3</tspan></text>
            <text x="300" y="275" font-size="24">⋮</text>
            <text x="300" y="345">y<tspan baseline-shift="sub" font-size="0.75em">N</tspan></text>
        </g>
    </g>

</svg>
