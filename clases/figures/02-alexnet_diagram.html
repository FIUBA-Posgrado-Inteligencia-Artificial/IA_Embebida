<svg viewBox="0 0 700 200"
    style="width: 100%; display: block; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); border-radius: 0.5rem; background: rgba(255,255,255,0.05);">
    <defs>
        <marker id="arrow-alex" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6"
            orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="rgba(248, 248, 242, 0.4)" />
        </marker>
        <filter id="glow-alex">
            <feGaussianBlur stdDeviation="2" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <text x="350" y="25" fill="#f8f8f2" font-size="14" font-weight="bold" font-family="sans-serif"
        text-anchor="middle">AlexNet (Distributed across 2 GPUs)</text>

    <rect x="100" y="45" width="280" height="110" fill="rgba(68, 71, 90, 0.3)" stroke="#44475a" stroke-dasharray="4" />
    <text x="240" y="40" fill="#6272a4" font-size="10" font-weight="bold" font-family="sans-serif"
        text-anchor="middle">Parallel Feature Extraction</text>

    <!-- GPU 1 (Top Path) -->
    <!-- GPU 2 (Bottom Path) -->

    <rect x="20" y="80" width="40" height="40" fill="rgba(248, 248, 242, 0.2)" stroke="#f8f8f2" stroke-width="2" />
    <text x="40" y="135" fill="#f8f8f2" font-size="10" font-family="sans-serif" text-anchor="middle">In</text>

    <!-- Split into 2 paths -->

        marker-end="url(#arrow-alex)" />

        marker-end="url(#arrow-alex)" />

    <!-- Stream 1 (Top) -->

        filter="url(#glow-alex)" />
    <path d="M 140 65 L 160 65" stroke="rgba(248, 248, 242, 0.4)" stroke-width="2" marker-end="url(#arrow-alex)" />

    <rect x="170" y="55" width="15" height="20" fill="rgba(80, 250, 123, 0.4)" stroke="#50fa7b"

    <rect x="215" y="55" width="25" height="20" fill="rgba(189, 147, 249, 0.6)" stroke="#bd93f9"

    <path d="M 240 65 L 260 65" stroke="rgba(248, 248, 242, 0.4)" stroke-width="2" marker-end="url(#arrow-alex)" />

        filter="url(#glow-alex)" />
    <text x="335" y="45" fill="#bd93f9" font-size="10" font-family="sans-serif" text-anchor="middle">Conv 3,4,5</text>

    <!-- Cross GPU Connections -->
    <path d="M 227 75 L 227 125" stroke="none" stroke-width="2" />
    <line x1="227" y1="75" x2="227" y2="125" stroke="#f1fa8c" stroke-width="2" stroke-dasharray="4" />

    <rect x="215" y="125" width="25" height="20" fill="rgba(189, 147, 249, 0.6)" stroke="#bd93f9"
        filter="url(#glow-alex)" />

    <path d="M 355 135 L 380 135 L 380 100 L 410 100" fill="none" stroke="rgba(248, 248, 242, 0.4)" stroke-width="2"
        marker-end="url(#arrow-alex)" />

    <!-- FC Layers -->
    <rect x="420" y="40" width="30" height="120" fill="rgba(255, 184, 108, 0.5)" stroke="#ffb86c" stroke-width="2"
        filter="url(#glow-alex)" />
    <text x="435" y="175" fill="#ffb86c" font-size="10" font-family="sans-serif" text-anchor="middle">FC 4096</text>
    <path d="M 450 100 L 500 100" stroke="rgba(248, 248, 242, 0.4)" stroke-width="2" marker-end="url(#arrow-alex)" />

    <rect x="510" y="40" width="30" height="120" fill="rgba(255, 184, 108, 0.7)" stroke="#ffb86c" stroke-width="2"
        filter="url(#glow-alex)" />

    <path d="M 540 100 L 590 100" stroke="rgba(248, 248, 242, 0.4)" stroke-width="2" marker-end="url(#arrow-alex)" />

    <!-- Output -->
    <circle cx="610" cy="100" r="20" fill="rgba(255, 85, 85, 0.8)" stroke="#ff5555" stroke-width="2"
        filter="url(#glow-alex)" />
    <text x="610" y="105" fill="#f8f8f2" font-size="12" font-weight="bold" font-family="sans-serif"
        text-anchor="middle">1000</text>
    <text x="610" y="135" fill="#ff5555" font-size="10" font-family="sans-serif" text-anchor="middle">Softmax</text>
