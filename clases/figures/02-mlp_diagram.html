<svg viewBox="0 0 650 400"
    style="width: 100%; max-width: 650px; margin: 0 auto; display: block; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3)); border-radius: 0.5rem; background: rgba(255,255,255,0.05);">
    <defs>
        <!-- Glow effect -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Title / Labels -->
    <text x="100" y="30" fill="#f8f8f2" font-size="16" text-anchor="middle" font-family="sans-serif">Entrada</text>
    <text x="325" y="30" fill="#f8f8f2" font-size="16" text-anchor="middle" font-family="sans-serif">Capas
        Ocultas</text>
    <text x="550" y="30" fill="#f8f8f2" font-size="16" text-anchor="middle" font-family="sans-serif">Salida</text>

    <!-- Connections -->
    <path d="
    M 100 100 L 250 50 M 100 100 L 250 125 M 100 100 L 250 200 M 100 100 L 250 275 M 100 100 L 250 350
    M 100 200 L 250 50 M 100 200 L 250 125 M 100 200 L 250 200 M 100 200 L 250 275 M 100 200 L 250 350
    M 100 300 L 250 50 M 100 300 L 250 125 M 100 300 L 250 200 M 100 300 L 250 275 M 100 300 L 250 350

    M 250 50 L 400 50 M 250 50 L 400 150 M 250 50 L 400 250 M 250 50 L 400 350
    M 250 125 L 400 50 M 250 125 L 400 150 M 250 125 L 400 250 M 250 125 L 400 350
    M 250 200 L 400 50 M 250 200 L 400 150 M 250 200 L 400 250 M 250 200 L 400 350
    M 250 275 L 400 50 M 250 275 L 400 150 M 250 275 L 400 250 M 250 275 L 400 350
    M 250 350 L 400 50 M 250 350 L 400 150 M 250 350 L 400 250 M 250 350 L 400 350

    M 400 50 L 550 150 M 400 50 L 550 250
    M 400 150 L 550 150 M 400 150 L 550 250
    M 400 250 L 550 150 M 400 250 L 550 250
    M 400 350 L 550 150 M 400 350 L 550 250
  " stroke="rgba(248, 248, 242, 0.15)" stroke-width="1.5" fill="none" />

    <!-- Input Layer Nodes -->
    <g filter="url(#glow)">
        <g fill="rgba(139, 233, 253, 0.2)" stroke="#8be9fd" stroke-width="2">
            <circle cx="100" cy="100" r="22" />
            <circle cx="100" cy="200" r="22" />
            <circle cx="100" cy="300" r="22" />
        </g>
        <g font-size="16" fill="#8be9fd" text-anchor="middle" font-family="math, sans-serif">
            <text x="100" y="105">x<tspan baseline-shift="sub" font-size="0.75em">1</tspan></text>
            <text x="100" y="205">x<tspan baseline-shift="sub" font-size="0.75em">2</tspan></text>
            <text x="100" y="305">x<tspan baseline-shift="sub" font-size="0.75em">3</tspan></text>
        </g>
    </g>

    <!-- Hidden Layer 1 Nodes -->
    <g filter="url(#glow)">
        <g fill="rgba(189, 147, 249, 0.2)" stroke="#bd93f9" stroke-width="2">
            <circle cx="250" cy="50" r="22" />
            <circle cx="250" cy="125" r="22" />
            <circle cx="250" cy="200" r="22" />
            <circle cx="250" cy="275" r="22" />
            <circle cx="250" cy="350" r="22" />
        </g>
        <g font-size="16" fill="#bd93f9" text-anchor="middle" font-family="math, sans-serif">
            <text x="250" y="55">h<tspan baseline-shift="super" font-size="0.7em">1</tspan>
                <tspan baseline-shift="sub" font-size="0.7em" dx="-5">1</tspan>
            </text>
            <text x="250" y="130">h<tspan baseline-shift="super" font-size="0.7em">1</tspan>
                <tspan baseline-shift="sub" font-size="0.7em" dx="-5">2</tspan>
            </text>
            <text x="250" y="205">h<tspan baseline-shift="super" font-size="0.7em">1</tspan>
                <tspan baseline-shift="sub" font-size="0.7em" dx="-5">3</tspan>
            </text>
            <text x="250" y="280">h<tspan baseline-shift="super" font-size="0.7em">1</tspan>
                <tspan baseline-shift="sub" font-size="0.7em" dx="-5">4</tspan>
            </text>
            <text x="250" y="355">h<tspan baseline-shift="super" font-size="0.7em">1</tspan>
                <tspan baseline-shift="sub" font-size="0.7em" dx="-5">5</tspan>
            </text>
        </g>
    </g>

    <!-- Hidden Layer 2 Nodes -->
    <g filter="url(#glow)">
        <g fill="rgba(189, 147, 249, 0.2)" stroke="#bd93f9" stroke-width="2">
            <circle cx="400" cy="50" r="22" />
            <circle cx="400" cy="150" r="22" />
            <circle cx="400" cy="250" r="22" />
            <circle cx="400" cy="350" r="22" />
        </g>
        <g font-size="16" fill="#bd93f9" text-anchor="middle" font-family="math, sans-serif">
            <text x="400" y="55">h<tspan baseline-shift="super" font-size="0.7em">2</tspan>
                <tspan baseline-shift="sub" font-size="0.7em" dx="-5">1</tspan>
            </text>
            <text x="400" y="155">h<tspan baseline-shift="super" font-size="0.7em">2</tspan>
                <tspan baseline-shift="sub" font-size="0.7em" dx="-5">2</tspan>
            </text>
            <text x="400" y="255">h<tspan baseline-shift="super" font-size="0.7em">2</tspan>
                <tspan baseline-shift="sub" font-size="0.7em" dx="-5">3</tspan>
            </text>
            <text x="400" y="355">h<tspan baseline-shift="super" font-size="0.7em">2</tspan>
                <tspan baseline-shift="sub" font-size="0.7em" dx="-5">4</tspan>
            </text>
        </g>
    </g>

    <!-- Output Layer Nodes -->
    <g filter="url(#glow)">
        <g fill="rgba(255, 85, 85, 0.2)" stroke="#ff5555" stroke-width="2">
            <circle cx="550" cy="150" r="22" />
            <circle cx="550" cy="250" r="22" />
        </g>
        <g font-size="16" fill="#ff5555" text-anchor="middle" font-family="math, sans-serif">
            <text x="550" y="155">y<tspan baseline-shift="sub" font-size="0.75em">1</tspan></text>
            <text x="550" y="255">y<tspan baseline-shift="sub" font-size="0.75em">2</tspan></text>
        </g>
    </g>

</svg>
